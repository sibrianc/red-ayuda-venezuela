services:
  - type: web
    name: red-ayuda-venezuela
    runtime: python
    # Plan pagado. No sincronizar este Blueprint sin aprobación explícita.
    plan: starter
    buildCommand: pip install -r requirements.txt
    preDeployCommand: flask db upgrade
    startCommand: gunicorn wsgi:app
    healthCheckPath: /
    envVars:
      - key: FLASK_ENV
        value: production
      - key: FLASK_APP
        value: wsgi.py
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: red-ayuda-venezuela-db
          property: connectionString

  # Refresco automático de datos cada 8 horas (USGS, GDACS, OSM, IODA + corroboración).
  # Mantiene mapa y directorio frescos sin intervención manual. Costo ~centavos/mes.
  - type: cron
    name: red-ayuda-ingest
    runtime: python
    plan: starter
    schedule: "0 */8 * * *"
    buildCommand: pip install -r requirements.txt
    command: flask db upgrade && flask ingest-all
    envVars:
      - key: FLASK_ENV
        value: production
      - key: FLASK_APP
        value: wsgi.py
      - key: SECRET_KEY
        fromService:
          type: web
          name: red-ayuda-venezuela
          envVarKey: SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: red-ayuda-venezuela-db
          property: connectionString

databases:
  - name: red-ayuda-venezuela-db
    # Plan pagado con backups/PITR del proveedor. Requiere aprobación antes de crearlo.
    plan: basic-256mb
    databaseName: red_ayuda_venezuela
    user: red_ayuda_venezuela
