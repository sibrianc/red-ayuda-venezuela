services:
  - type: web
    name: red-ayuda-venezuela
    runtime: python
    # Plan pagado. No sincronizar este Blueprint sin aprobación explícita.
    plan: starter
    buildCommand: pip install -r requirements.txt
    preDeployCommand: flask db upgrade
    startCommand: gunicorn wsgi:app
    healthCheckPath: /
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: red-ayuda-venezuela-db
          property: connectionString

databases:
  - name: red-ayuda-venezuela-db
    # Plan pagado con backups/PITR del proveedor. Requiere aprobación antes de crearlo.
    plan: basic-256mb
    databaseName: red_ayuda_venezuela
    user: red_ayuda_venezuela
