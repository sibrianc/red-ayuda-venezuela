name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: pytest --cov=app --cov-report=term-missing
      - run: python -m compileall -q app

  # Escaneo de vulnerabilidades conocidas (CVE) en las dependencias de runtime.
  # No es un check requerido para mergear: aparece en cada PR para dar visibilidad
  # y se pone en rojo si una dependencia tiene una vulnerabilidad publicada.
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install pip-audit
      - run: pip-audit -r requirements.txt
