{% extends "base.html" %}
{% block title %}Error {{ code }} · {{ config.APP_NAME }}{% endblock %}
{% from "_ui.html" import hero with context %}
{% block content %}
<div class="rv-page">
{% call hero('Error ' ~ code, message) %}
  <p class="rv-lead">No se expusieron detalles internos.</p>
  <div class="rv-hero-actions"><a class="rv-btn rv-btn-light" href="{{ url_for('public.home') }}">Volver al inicio</a></div>
{% endcall %}
</div>
{% endblock %}
